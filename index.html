<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditor Omie V-17.4</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #004a8d; --green: #2ecc71; --red: #e74c3c; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f9; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        #reader { width: 100%; background: #000; border-radius: 8px; display: none; margin-bottom: 10px; }
        .item-res { padding: 12px; border-bottom: 1px solid #eee; background: #fff; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; padding: 20px; border-radius: 15px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
    </style>
</head>
<body>

    <div class="card">
        <h3>1. Carregar Planilha Omie</h3>
        <input type="file" id="file-input" accept=".xlsx, .xls">
        <div id="info-carga" style="font-size: 12px; color: blue; font-weight: bold;">Aguardando arquivo...</div>
    </div>

    <div class="card">
        <h3>2. Scanner / Busca</h3>
        <div id="reader"></div>
        <button id="btn-cam" class="btn-blue" onclick="controlarCamera()">📷 LIGAR CÂMERA</button>
        <input type="text" id="busca-input" placeholder="Digite nome ou código...">
        <div id="resultados"></div>
    </div>

    <div class="card">
        <div id="stats" style="font-weight: bold; margin-bottom: 10px;">Itens Contados: 0</div>
        <button class="btn-green" onclick="baixarExcel()">📥 BAIXAR RESULTADO</button>
        <button class="btn-red" onclick="limparLocalStorage()" style="font-size: 11px;">Limpar Tudo</button>
        <table id="tabela">
            <thead><tr><th>Produto</th><th>Sist|Fís|Dif</th></tr></thead>
            <tbody id="tabela-body"></tbody>
        </table>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h4 id="m-titulo"></h4>
            <p id="m-info" style="font-size: 12px; color: #666;"></p>
            <label>Qtd Física:</label>
            <input type="number" id="m-qtd" inputmode="decimal">
            <input type="text" id="m-lote" placeholder="Lote">
            <input type="text" id="m-validade" placeholder="Validade (DDMMYY)" inputmode="numeric">
            <button class="btn-green" onclick="salvar()">CONFIRMAR</button>
            <button onclick="fecharModal()">CANCELAR</button>
        </div>
    </div>

    <script>
        let baseDados = [];
        let contagens = JSON.parse(localStorage.getItem('contas_v17_4')) || [];
        let itemAtual = null;
        let html5QrCode = null;

        // Máscara de Data Automática
        document.getElementById('m-validade').oninput = function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 2) v = v.substring(0,2) + '/' + v.substring(2);
            if (v.length > 5) v = v.substring(0,5) + '/' + v.substring(5,9);
            e.target.value = v;
        };

        // Lógica de Importação Robusta
        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = evt.target.result;
                const workbook = XLSX.read(data, {type: 'binary'});
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(sheet, {header: 1}); // Pega linhas brutas
                
                baseDados = [];
                // Pula as primeiras linhas (cabeçalho do Omie) e tenta ler dados
                rows.forEach((row, index) => {
                    if (index > 1 && row.length >= 2) {
                        baseDados.push({
                            codigo: String(row[0] || ''),
                            descricao: String(row[1] || ''),
                            sistema: parseFloat(row[2] || 0),
                            cmc: parseFloat(row[3] || 0)
                        });
                    }
                });
                document.getElementById('info-carga').innerText = "✅ " + baseDados.length + " produtos carregados!";
            };
            reader.readAsBinaryString(e.target.files[0]);
        };

        // Busca
        document.getElementById('busca-input').oninput = function() {
            const termo = this.value.toLowerCase();
            const div = document.getElementById('resultados');
            div.innerHTML = '';
            if (termo.length < 2) return;

            const matches = baseDados.filter(i => i.descricao.toLowerCase().includes(termo) || i.codigo.toLowerCase().includes(termo));
            matches.slice(0, 5).forEach(i => {
                const d = document.createElement('div');
                d.className = 'item-res';
                d.innerHTML = `<strong>${i.codigo}</strong><br>${i.descricao}`;
                d.onclick = () => abrirModal(i);
                div.appendChild(d);
            });
        };

        function controlarCamera() {
            const btn = document.getElementById('btn-cam');
            const readerDiv = document.getElementById('reader');
            
            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            if (btn.innerText.includes("LIGAR")) {
                readerDiv.style.display = "block";
                btn.innerText = "🛑 DESLIGAR CÂMERA";
                html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (txt) => {
                    const achei = baseDados.find(i => i.codigo === txt);
                    abrirModal(achei || {codigo: txt, descricao: "Novo Produto", sistema: 0, cmc: 0});
                });
            } else {
                desligarCam();
            }
        }

        function desligarCam() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = "none";
                    document.getElementById('btn-cam').innerText = "📷 LIGAR CÂMERA";
                }).catch(() => {});
            }
        }

        function abrirModal(item) {
            itemAtual = item;
            document.getElementById('m-titulo').innerText = item.descricao;
            document.getElementById('m-info').innerText = "Sistema: " + item.sistema;
            document.getElementById('modal').style.display = "flex";
            document.getElementById('m-qtd').value = '';
            setTimeout(() => document.getElementById('m-qtd').focus(), 300);
        }

        function fecharModal() { document.getElementById('modal').style.display = "none"; }

        function salvar() {
            const q = parseFloat(document.getElementById('m-qtd').value);
            if (isNaN(q)) return alert("Digite a quantidade!");

            const registro = {
                codigo: itemAtual.codigo,
                descricao: itemAtual.descricao,
                sistema: itemAtual.sistema,
                fisico: q,
                dif: q - itemAtual.sistema,
                lote: document.getElementById('m-lote').value,
                validade: document.getElementById('m-validade').value
            };

            contagens.unshift(registro);
            localStorage.setItem('contas_v17_4', JSON.stringify(contagens));
            atualizarTabela();
            fecharModal();
            document.getElementById('busca-input').value = '';
            document.getElementById('resultados').innerHTML = '';
        }

        function atualizarTabela() {
            const body = document.getElementById('tabela-body');
            body.innerHTML = '';
            contagens.forEach(i => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${i.descricao}</td><td>${i.sistema}|${i.fisico}|${i.dif}</td>`;
                body.appendChild(tr);
            });
            document.getElementById('stats').innerText = "Itens Contados: " + contagens.length;
        }

        function baixarExcel() {
            const ws = XLSX.utils.json_to_sheet(contagens);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Inventario");
            XLSX.writeFile(wb, "resultado_auditoria.xlsx");
        }

        function limparLocalStorage() {
            if(confirm("Apagar tudo?")) {
                localStorage.removeItem('contas_v17_4');
                contagens = [];
                atualizarTabela();
            }
        }

        atualizarTabela();
    </script>
</body>
</html>

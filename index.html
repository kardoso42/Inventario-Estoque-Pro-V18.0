<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditor Omie V-19.6 - REVISÃO TOTAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #004a8d; --green: #2ecc71; --red: #e74c3c; --gray: #7f8c8d; --orange: #f39c12; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: #f4f7f9; color: #333; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; font-weight: bold; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 4px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        .uppercase-input { text-transform: uppercase; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-orange { background: var(--orange); color: white; }
        #reader { width: 100%; background: #000; border-radius: 8px; display: none; margin-bottom: 10px; overflow: hidden; }
        .item-res { padding: 12px; border-bottom: 1px solid #eee; background: #fff; cursor: pointer; }
        .item-detail { font-size: 11px; color: #666; margin-top: 3px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; padding: 20px; border-radius: 15px; box-sizing: border-box; max-height: 90vh; overflow-y: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; background: white; }
        th, td { border: 1px solid #ddd; padding: 5px; text-align: center; }
        th { background: #f8f9fa; }
        .input-novo-nome { font-weight: bold; color: var(--blue); border: 2px solid var(--orange) !important; background: #fffbea; }
    </style>
</head>
<body>

    <div class="card">
        <h3 style="margin:0; color:var(--blue);">1. Importar Planilha</h3>
        <input type="file" id="file-input" accept=".xlsx, .xls">
        <div style="display: flex; gap: 5px;">
            <select id="filtro-local"><option value="">📍 LOCAL (TODOS)</option></select>
            <select id="filtro-familia"><option value="">📂 FAMÍLIA (TODOS)</option></select>
        </div>
        <div id="info-carga" style="font-size: 11px; color: var(--gray); margin-top: 5px;">Aguardando planilha...</div>
    </div>

    <div class="card">
        <h3 style="margin:0; color:var(--blue);">2. Scanner / Busca</h3>
        <div id="reader"></div>
        <button id="btn-cam" class="btn-blue" onclick="controlarCamera()">📷 LIGAR SCANNER</button>
        <input type="text" id="busca-input" class="uppercase-input" placeholder="BUSCAR NOME OU CÓDIGO...">
        <div id="resultados" style="max-height: 200px; overflow-y: auto;"></div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 13px; margin-bottom: 10px;">
            <span id="stats-contagem">ITENS: 0</span>
            <span id="stats-valor" style="color: var(--blue);">IMPACTO: R$ 0,00</span>
        </div>
        
        <button class="btn-green" onclick="baixarExcel()">📥 BAIXAR EXCEL</button>
        <button class="btn-orange" onclick="apagarUltimo()">↩️ APAGAR ÚLTIMO</button>
        <button class="btn-red" onclick="limparTudo()" style="font-size: 10px; opacity: 0.7;">Limpar Tudo</button>
        
        <div style="overflow-x: auto;">
            <table id="tabela">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Sist</th>
                        <th>Fis</th>
                        <th>Dif</th>
                        <th>CMC</th>
                    </tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <label style="font-size: 11px; font-weight: bold;">NOME DO PRODUTO:</label>
            <input type="text" id="m-nome-edit" class="uppercase-input">
            
            <div id="m-info-box" style="background:#f1f4f8; padding:10px; border-radius:8px; margin:10px 0; border-left:5px solid var(--blue);">
                <p id="m-loc-cod" style="font-size:11px; margin:2px 0; color:#555;"></p>
                <p id="m-sist-val" style="font-size:13px; margin:4px 0; font-weight:bold; color:var(--blue);"></p>
                <p id="m-cmc-val" style="font-size:11px; margin:2px 0; color:#666;"></p>
            </div>

            <label style="font-size:12px; font-weight:bold;">Qtd Física:</label>
            <input type="number" id="m-qtd" inputmode="decimal">
            
            <div style="display:flex; gap:8px;">
                <div style="flex:1;"><label style="font-size:11px; font-weight:bold;">Lote:</label><input type="text" id="m-lote" class="uppercase-input"></div>
                <div style="flex:1;"><label style="font-size:11px; font-weight:bold;">Validade:</label><input type="tel" id="m-validade" maxlength="10"></div>
            </div>
            
            <button class="btn-green" onclick="salvar()" style="margin-top:15px;">✅ CONFIRMAR</button>
            <button onclick="fecharModal()" style="background:#eee; color:#333;">CANCELAR</button>
        </div>
    </div>

    <script>
        let baseDados = [];
        let contagens = JSON.parse(localStorage.getItem('contas_v19_6')) || [];
        let itemAtual = null;
        let html5QrCode = null;

        // Máscara de Data
        document.getElementById('m-validade').oninput = function(e) {
            let v = e.target.value.replace(/\D/g, '');
            if (v.length > 4) v = v.substring(0, 2) + '/' + v.substring(2, 4) + '/' + v.substring(4, 8);
            else if (v.length > 2) v = v.substring(0, 2) + '/' + v.substring(2);
            e.target.value = v;
        };

        // Forçar maiúsculas nos inputs de texto
        document.querySelectorAll('.uppercase-input').forEach(el => {
            el.addEventListener('input', e => e.target.value = e.target.value.toUpperCase());
        });

        document.getElementById('file-input').onchange = function(e) {
            const reader = new FileReader();
            reader.onload = function(evt) {
                const workbook = XLSX.read(evt.target.result, {type: 'binary'});
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[0]], {header: 1});
                baseDados = []; let locais = new Set(); let familias = new Set();
                rows.forEach((row, index) => {
                    if (index > 2 && row[1]) {
                        const loc = String(row[12] || 'SEM LOCAL').trim().toUpperCase();
                        const fam = String(row[2] || 'SEM FAMILIA').trim().toUpperCase();
                        locais.add(loc); familias.add(fam);
                        baseDados.push({
                            codigo: String(row[0] || '').trim().toUpperCase(),
                            descricao: String(row[1] || '').trim().toUpperCase(),
                            familia: fam, local: loc,
                            loteOriginal: String(row[4] || '').trim(),
                            validadeOriginal: String(row[5] || '').trim(),
                            sistema: parseFloat(row[9] || 0), cmc: parseFloat(row[10] || 0)
                        });
                    }
                });
                atualizarFiltros(locais, familias);
                document.getElementById('info-carga').innerText = `✅ ${baseDados.length} ITENS CARREGADOS.`;
            };
            reader.readAsBinaryString(e.target.files[0]);
        };

        function atualizarFiltros(locais, familias) {
            const selL = document.getElementById('filtro-local');
            const selF = document.getElementById('filtro-familia');
            selL.innerHTML = '<option value="">📍 LOCAL (TODOS)</option>';
            Array.from(locais).sort().forEach(l => selL.innerHTML += `<option value="${l}">${l}</option>`);
            selF.innerHTML = '<option value="">📂 FAMÍLIA (TODOS)</option>';
            Array.from(familias).sort().forEach(f => selF.innerHTML += `<option value="${f}">${f}</option>`);
        }

        document.getElementById('busca-input').oninput = function() {
            const t = this.value.toUpperCase().trim();
            const lS = document.getElementById('filtro-local').value;
            const fS = document.getElementById('filtro-familia').value;
            const res = document.getElementById('resultados');
            res.innerHTML = ''; if (t.length < 1) return;
            
            const filtered = baseDados.filter(i => {
                const matchTexto = i.descricao.includes(t) || i.codigo.includes(t);
                const matchLocal = lS === "" || i.local === lS;
                const matchFam = fS === "" || i.familia === fS;
                return matchTexto && matchLocal && matchFam;
            });

            filtered.slice(0, 15).forEach(i => {
                const d = document.createElement('div'); d.className = 'item-res';
                d.innerHTML = `<strong>${i.descricao}</strong><div class="item-detail">${i.local} | CÓD: ${i.codigo} | <span style="color:var(--blue); font-weight:bold;">SISTEMA: ${i.sistema}</span> | CMC: ${i.cmc.toFixed(2)}</div>`;
                d.onclick = () => abrirModal(i, false);
                res.appendChild(d);
            });
        };

        async function controlarCamera() {
            const btn = document.getElementById('btn-cam');
            if (btn.innerText.includes("LIGAR")) {
                document.getElementById('reader').style.display = "block";
                btn.innerText = "🛑 PARAR SCANNER"; btn.className = "btn-red";
                if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
                await html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (txt) => {
                    const cod = txt.trim().toUpperCase();
                    const lS = document.getElementById('filtro-local').value;
                    let item = baseDados.find(i => i.codigo === cod && (lS === "" || i.local === lS)) || baseDados.find(i => i.codigo === cod);
                    desligarCam();
                    if(item) abrirModal(item, false);
                    else abrirModal({codigo: cod, descricao: "PRODUTO NOVO", local: lS||"MANUAL", sistema:0, cmc:0}, true);
                });
            } else { desligarCam(); }
        }

        function desligarCam() {
            if (html5QrCode) html5QrCode.stop();
            document.getElementById('reader').style.display = "none";
            document.getElementById('btn-cam').innerText = "📷 LIGAR SCANNER"; document.getElementById('btn-cam').className = "btn-blue";
        }

        function abrirModal(item, isNovo) {
            itemAtual = item;
            const inputNome = document.getElementById('m-nome-edit');
            inputNome.value = item.descricao.toUpperCase();
            inputNome.readOnly = !isNovo;
            inputNome.className = isNovo ? 'input-novo-nome uppercase-input' : 'uppercase-input';
            
            document.getElementById('m-loc-cod').innerText = `📍 LOCAL: ${item.local} | CÓD: ${item.codigo}`;
            document.getElementById('m-sist-val').innerText = `ESTOQUE SISTEMA: ${item.sistema}`;
            document.getElementById('m-cmc-val').innerText = `CMC UNITÁRIO: R$ ${item.cmc.toFixed(2)}`;
            
            document.getElementById('m-lote').value = (item.loteOriginal || "").toUpperCase();
            document.getElementById('m-validade').value = item.validadeOriginal || "";
            document.getElementById('modal').style.display = "flex";
            document.getElementById('m-qtd').value = '';
            setTimeout(() => document.getElementById('m-qtd').focus(), 300);
        }

        function fecharModal() { document.getElementById('modal').style.display = "none"; }

        function salvar() {
            const q = parseFloat(document.getElementById('m-qtd').value);
            if (isNaN(q)) return alert("INFORME A QTD");
            
            contagens.unshift({
                codigo: itemAtual.codigo,
                descricao: document.getElementById('m-nome-edit').value.toUpperCase(),
                local: itemAtual.local,
                sistema: itemAtual.sistema,
                fisico: q,
                dif: q - itemAtual.sistema,
                cmc_unitario: itemAtual.cmc,
                v_dif: (q - itemAtual.sistema) * itemAtual.cmc,
                lote: document.getElementById('m-lote').value.toUpperCase(),
                validade: document.getElementById('m-validade').value,
                data: new Date().toLocaleString()
            });
            localStorage.setItem('contas_v19_6', JSON.stringify(contagens));
            render(); fecharModal();
            document.getElementById('busca-input').value = ''; document.getElementById('resultados').innerHTML = '';
        }

        function apagarUltimo() {
            if (contagens.length > 0 && confirm("APAGAR ÚLTIMA CONTAGEM?")) {
                contagens.shift();
                localStorage.setItem('contas_v19_6', JSON.stringify(contagens));
                render();
            }
        }

        function render() {
            const body = document.getElementById('tabela-body');
            let vT = 0; body.innerHTML = '';
            contagens.forEach(i => {
                vT += i.v_dif;
                body.innerHTML += `<tr>
                    <td style="text-align:left">${i.descricao}</td>
                    <td>${i.sistema}</td>
                    <td style="font-weight:bold">${i.fisico}</td>
                    <td style="color:${i.dif < 0 ? 'red' : 'green'}">${i.dif}</td>
                    <td>${i.cmc_unitario.toFixed(2)}</td>
                </tr>`;
            });
            document.getElementById('stats-contagem').innerText = "ITENS: " + contagens.length;
            document.getElementById('stats-valor').innerText = "IMPACTO: R$ " + vT.toFixed(2);
        }

        function baixarExcel() {
            const ws = XLSX.utils.json_to_sheet(contagens);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "AUDITORIA");
            XLSX.writeFile(wb, "INVENTARIO_FINAL.xlsx");
        }

        function limparTudo() { if(confirm("LIMPAR TODAS AS CONTAGENS?")) { localStorage.removeItem('contas_v19_6'); contagens = []; render(); } }
        render();
    </script>
</body>
</html>

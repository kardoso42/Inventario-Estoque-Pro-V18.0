<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auditor Omie V-22.6 - UNIDADE LIBERADA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --blue: #004a8d; --green: #2ecc71; --red: #e74c3c; --gray: #7f8c8d; --orange: #f39c12; --bg: #f4f7f9; }
        body { font-family: sans-serif; margin: 0; padding: 10px; background: var(--bg); color: #333; }
        .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; }
        .dash-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .dash-card { background: white; padding: 10px; border-radius: 8px; text-align: center; border-top: 4px solid var(--blue); }
        .dash-card p { margin: 5px 0 0; font-size: 16px; font-weight: bold; color: var(--blue); }
        button { width: 100%; padding: 15px; margin: 8px 0; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-green { background: var(--green) !important; color: white !important; }
        .btn-orange { background: var(--orange); color: white; }
        .diff-neg { color: var(--red) !important; font-weight: bold; }
        .diff-pos { color: var(--blue) !important; font-weight: bold; }
        .diff-zero { color: var(--green) !important; font-weight: bold; }
        .item-res { padding: 12px; border-bottom: 1px solid #eee; background: #fff; cursor: pointer; border-radius: 5px; margin-bottom: 5px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 95%; padding: 20px; border-radius: 15px; max-height: 90vh; overflow-y: auto; box-sizing: border-box; }
        .m-info-box { background:#f1f4f8; padding:12px; border-radius:8px; margin:10px 0; border-left:5px solid var(--blue); }
        .unidade-input-novo { background: #fffbea; border: 2px solid var(--orange) !important; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 10px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px 4px; text-align: center; }
        input, select { text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="dash-container">
        <div class="dash-card"><h4>Itens Lidos</h4><p id="dash-skus">0</p></div>
        <div class="dash-card" style="border-top-color: var(--orange);"><h4>Total Peças</h4><p id="dash-pecas">0</p></div>
    </div>

    <div class="card">
        <label style="font-size: 11px; font-weight: bold;">1. CARREGAR PLANILHA VIE HOTEL:</label>
        <input type="file" id="file-input" accept=".xlsx, .xls, .csv">
        <div style="display: flex; gap: 5px; margin-top: 10px;">
            <select id="filtro-local" style="flex:1; padding:10px;"><option value="">📍 LOCAL (TODOS)</option></select>
            <select id="filtro-familia" style="flex:1; padding:10px;"><option value="">📂 FAMÍLIA (TODOS)</option></select>
        </div>
        <div id="info-carga" style="font-size: 11px; color: var(--orange); font-weight: bold; margin-top: 5px;">Aguardando arquivo...</div>
    </div>

    <div class="card">
        <button id="btn-cam" class="btn-blue" onclick="controlarCamera()">📷 LIGAR SCANNER</button>
        <div id="reader" style="display:none; width:100%; margin-bottom:10px;"></div>
        <input type="text" id="busca-input" style="width:100%; padding:12px; box-sizing:border-box; border-radius:8px; border:1px solid #ddd;" placeholder="PESQUISAR PRODUTO...">
        <div id="resultados" style="max-height: 200px; overflow-y: auto; margin-top:10px;"></div>
    </div>

    <div class="card">
        <button class="btn-green" onclick="baixarExcel()">📥 EXPORTAR EXCEL</button>
        <button class="btn-orange" onclick="apagarUltimo()">↩️ APAGAR ÚLTIMO</button>
        <div style="overflow-x: auto;">
            <table id="tabela">
                <thead>
                    <tr><th style="text-align:left">Produto</th><th>Sist</th><th>Fis</th><th>Dif</th><th>CMC</th></tr>
                </thead>
                <tbody id="tabela-body"></tbody>
            </table>
        </div>
        <button onclick="limparTudo()" style="color:red; background:none; text-decoration:underline; font-size:10px; margin-top:10px; border:none; cursor:pointer;">Limpar Tudo</button>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <label style="font-size: 11px; font-weight: bold;">PRODUTO:</label>
            <input type="text" id="m-nome-edit" style="width:100%; padding:10px; box-sizing:border-box;">
            
            <div class="m-info-box">
                <p id="m-gtin" style="font-size:11px; margin:0 0 5px 0; color:var(--orange); font-weight:bold;"></p>
                <p id="m-loc-cod" style="font-size:11px; margin:2px 0; color:#555;"></p>
                <p id="m-sist-val" style="font-size:14px; margin:4px 0; font-weight:bold; color:var(--blue);"></p>
            </div>

            <div style="display:flex; gap:10px;">
                <div style="flex:2;">
                    <label style="font-size:12px; font-weight:bold;">QTD FÍSICA:</label>
                    <input type="number" id="m-qtd" inputmode="decimal" style="width:100%; padding:15px; font-size:22px; font-weight:bold; border:2px solid var(--blue); border-radius:8px;">
                </div>
                <div style="flex:1;">
                    <label style="font-size:12px; font-weight:bold;">UNIDADE:</label>
                    <input type="text" id="m-un-edit" style="width:100%; padding:15px; font-size:18px; border-radius:8px; border:1px solid #ddd; text-align:center;">
                </div>
            </div>

            <div style="display:flex; gap:8px; margin-top:15px;">
                <div style="flex:1;"><label style="font-size:11px; font-weight:bold;">Lote:</label><input type="text" id="m-lote" style="width:100%; padding:10px; box-sizing:border-box;"></div>
                <div style="flex:1;"><label style="font-size:11px; font-weight:bold;">Validade:</label><input type="tel" id="m-validade" maxlength="10" placeholder="DD/MM/AAAA" style="width:100%; padding:10px; box-sizing:border-box;"></div>
            </div>
            
            <button class="btn-green" onclick="salvarFinal()">✅ SALVAR CONTAGEM</button>
            <button onclick="fecharModal()" style="background:#eee; margin-top:5px;">CANCELAR</button>
        </div>
    </div>
